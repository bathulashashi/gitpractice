<!DOCTYPE html>
<html>
<head>
    <title>Card Hover</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            font-family: Arial;
        }

        .card {
            width: 200px;
            height: 250px;
            background: url("https://via.placeholder.com/200") no-repeat center;
            background-size: cover;
            color: white;
            display: flex;
            align-items: end;
            justify-content: center;
            padding: 10px;
            transition: 0.5s;
        }

        .card:hover {
            background-color: rgba(0, 0, 0, 0.6);
            background-size: 120%;
        }
    </style>
</head>
<body>

<div class="card">Card 1 - Shashi</div>
<div class="card">Card 2</div>
<div class="card">Card 3</div>

</body>
</html>
