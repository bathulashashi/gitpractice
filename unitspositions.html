<!DOCTYPE html>
<html>
<head>
    <title>Layout Task</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Banner */
        .banner {
            height: 400px;
            background: url("https://via.placeholder.com/1200x400") no-repeat center;
            background-size: cover;
            background-attachment: fixed;
            margin-top: 60px;
        }

        /* Cards */
        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .card {
            width: 200px;
            height: 250px;
            background: lightgray;
            text-align: center;
            padding: 10px;
        }

        /* Footer */
        .footer {
            background: black;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="navbar">
    My Website - Shashi
</div>

<div class="banner"></div>

<div class="cards">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
</div>

<div class="footer">
    Footer Section
</div>

</body>
</html>
