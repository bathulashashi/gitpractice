<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h2>Counter Application</h2>
<h3>Count: <span id="count">0</span></h3>

<button id="inc">Increment</button>
<button id="dec">Decrement</button>
<button id="res">Reset</button>

<hr>

<h2>Change Background Color</h2>

<button class="color-btn" data-color="red">Red</button>
<button class="color-btn" data-color="blue">Blue</button>
<button class="color-btn" data-color="green">Green</button>
<button class="color-btn" data-color="yellow">Yellow</button>

<script>
    // Counter Logic
    let count = 0;
    const display = document.getElementById("count");

    document.getElementById("inc").addEventListener("click", () => {
        count++;
        display.innerText = count;
    });

    document.getElementById("dec").addEventListener("click", () => {
        count--;
        display.innerText = count;
    });

    document.getElementById("res").addEventListener("click", () => {
        count = 0;
        display.innerText = count;
    });

    // Color Change Logic
    const buttons = document.querySelectorAll(".color-btn");

    buttons.forEach(button => {
        button.addEventListener("click", function() {
            document.body.style.backgroundColor = this.dataset.color;
        });
    });
</script>

</body>

</html>
