<!DOCTYPE html>
<html>
<head>
    <title>Image Animation</title>
    <style>
        body {
            text-align: center;
            margin-top: 50px;
        }

        img {
            width: 200px;
            margin: 20px;
        }

        /* Rotate Animation */
        .rotate:hover {
            transform: rotate(360deg);
            transition: 1s;
        }

        /* Scale Animation */
        .scale:hover {
            transform: scale(1.2);
            transition: 0.5s;
        }

        /* Move Animation */
        .move {
            position: relative;
            animation: moveImg 3s infinite alternate;
        }

        @keyframes moveImg {
            from { left: 0px; }
            to { left: 200px; }
        }

        /* Fade Animation */
        .fade:hover {
            opacity: 0.3;
            transition: 0.5s;
        }
    </style>
</head>
<body>

<h2>Image Animations</h2>

<img src="https://via.placeholder.com/200" class="rotate">
<img src="https://via.placeholder.com/200" class="scale">
<img src="https://via.placeholder.com/200" class="move">
<img src="https://via.placeholder.com/200" class="fade">

</body>
</html>
